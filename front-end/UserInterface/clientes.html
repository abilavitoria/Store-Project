<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="clientes.css">
    <title>Clientes</title>
</head>
<body>
    <nav class="navbar">
        <h2>Clientes</h2>
    </nav>

    <main class="container">
        <section class="card">
            <div class="grid-menu"><span>Consultar Usuário</span></div>
            <div class="input-group">
                <input type="text" id="input-consulta" placeholder="Digite o nome">
                <button onclick="buscarUsuario();">Buscar</button>
            </div>
            <div class="response"><span id="response-consulta"></span></div>
        </section>

        <section class="card">
            <div class="grid-menu"><span>Criar Usuário</span></div>
            <div class="form-grid">
                <input type="text" id="criar-nome" placeholder="Digite o nome">
                <input type="password" id="criar-senha" placeholder="Digite a senha">
                <button onclick="criarUsuario();">Cadastrar</button>
            </div>
            <div class="response"><span id="response-criar"></span></div>
        </section>

        <section class="card">
            <div class="grid-menu"><span>Alterar Usuário</span></div>
            <div class="form-grid">
                <input type="text" id="mudar-nome" placeholder="Digite o nome">
                <input type="password" id="mudar-senha" placeholder="Digite a senha">
                <button onclick="mudarUsuario();">Alterar</button>
            </div>
            <div class="response"><span id="response-alterar"></span></div>
        </section>

        <section class="card">
            <div class="grid-menu"><span>Deletar Usuário</span></div>
            <div class="input-group">
                <input type="text" id="input-deletar" placeholder="Digite o nome">
                <button onclick="deletarUsuario();">Deletar</button>
            </div>
            <div class="response"><span id="response-consulta"></span></div>
        </section>
    </main>

    <script lang="javascript">
        const API_URL = "http://localhost:8081/clientes";

        async function buscarUsuario() {
            const nome = document.getElementById('input-consulta').value;
            const campoResposta = document.getElementById('response-consulta');

            try{
                const response = await fetch (`${API_URL}?nome=${nome}`);
                const dados = await response.json();

                if(response.ok){
                    campoResposta.innerText = `Usuario encontrado: ${dados.nome} - Email: ${dados.email}`;
                }else{
                    campoResposta.innerText = "Usuario não encontrado";
                }

            }catch(error){
                console.error("Erro na API:", error);
            }
        }

        async function criarUsuario() {
            const nome = document.getElementById('criar-nome').value;
            const senha = document.getElementById('criar-senha').value;

            const novoUsuario = {
                nome: nome,
                senha: senha
            };

            try{
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type' : 'application/json'},
                    body: JSON.stringify(novoUsuario)
                });

                if(response.ok){
                    alert("Usuario criado com sucesso");
                }
            }catch(error){
                    alert("Erro ao conectar com o servidor");
                }
        }

        async function deletarUsuario(id) {
            if(confirm("Tem certeza que deseja excluir?")) return;

            try{
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if(response.ok){
                    alert("Usuario excluido com sucesso!");
                }
            }catch(error){
                console.error("Erro ao deletar");
            }
        }
    </script>
</body>
</html>
