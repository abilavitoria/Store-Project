<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="clientes.css">
    <title>Store - Clientes</title>
</head>
<body>
    <div class="container">
        <h2>Cadastro Cliente</h2>
        <p>Preencha os dados do cliente...</p>
        <br>

        <form class="user-form" id="cliente-form">
            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome do cliente" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="(00)00000-0000" required>
            </div>

            <div class="input-group">
                <label for="documento">Documento(CPF/CNPJ)</label>
                <input type="text" id="documento" placeholder="Apenas números" maxlength="14" required>
            </div>

            <button type="submit" class="btn-salvar">Salvar Cliente</button>

            <div class="footer-link">
                <a href="main.html">Voltar ao inicio</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("cliente-form").addEventListener('submit', async (event) =>{
            event.preventDefault();

            const token = sessionStorage.getItem('token');

            const clienteDados = {
                nome: document.getElementById("nome").value,
                email: document.getElementById("email").value,
                telefone: document.getElementById("telefone").value,
                documento: document.getElementById("documento").value.replace(/\D/g, '')
            };

            try{
                const response = await fetch('http://localhost:8081/clientes', {
                    method:'POST',
                    headers:{
                        'Content-Type':'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(clienteDados)
                });

                if(response.ok){
                    alert("Cliente cadastrado com sucesso!");
                    document.getElementById("cliente-form").reset();
                }else{
                    const message = await response.text();
                    alert("Erro ao cadastrar:" + message);
                }
            }catch(error){
                console.log("Erro na conexão", error);
                alert("Erro ao conectar com o servidor");
            }
        })
    </script>
</body>
</html>
