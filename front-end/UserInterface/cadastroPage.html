<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastroStyle.css">
    <title>Store - Cadastro</title>
</head>
<body>
    <div class="container">
        <h2>Crie seu cadastro</h2>
        <p>gerencie sua loja</p>
        <br>
        <form class="user-form" id="user-form">
            <div class="input-group">
                <label for="login">Login</label>
                <input type="text" id="login" placeholder="Seu login" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Insira uma senha forte" required>
            </div>

            <div class="input-group">
                <label for="documento">Documento</label>
                <input type="text" id="documento" placeholder="Insira um documento (cpf/cnpj)" required>
            </div>

            <button type="submit" class="btn-entrar">Cadastrar</button>

            <div class="footer-link">
                <span>Já tem uma conta?</span>
                <a href="loginPage.html">Login</a>
            </div>
        </form>
    </div>

    <script lang="javascript">
        document.getElementById("user-form").addEventListener('submit', async (event) => {
            event.preventDefault();

            const login = document.getElementById("login").value;
            const senha = document.getElementById("senha").value;
            const documento = document.getElementById("documento").value.replace(/\D/g, '');

            let role = "";
            if(documento.length === 11) role = "VENDEDOR";
            else if(documento.length === 14) role = "ADMIN";
            else{
                alert("Documento inválido"); return;
            }

            const dadosUsuario = {
                login: login,
                senha: senha,
                role: role
            };

            try{
                const response = await fetch('http://localhost:8081/auth/cadastrar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dadosUsuario)
                });

                if(response.ok){
                    alert("Cadastro ${role} realizado com sucesso! Agora faça seu login!"); 
                    window.location.href = "loginPage.html";
                }else{
                    const erro = await response.text();
                    alert("Erro ao cadastrar" + erro);
                }
            }catch(error){
                console.log("Erro na conexao", error);
            }
        })
    </script>
</body>
</html>
