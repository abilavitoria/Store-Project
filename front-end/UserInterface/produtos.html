<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="produtos.css">
    <title>Store - Produtos</title>
</head>
<body>
    <div class="container">
        <h2>Cadastro Produtos</h2>
        <p>Preenca os dados corretamente</p>
        <br>

        <form class="user-form" id="produto-form">
            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome do produto" required>
            </div>

            <div class="input-group">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" placeholder="Marca, tamanho, modelo..." required>
            </div>

            <div class="input-group">
                <label for="preco">Preço</label>
                <input type="number" id="preco" placeholder="0.01" required>
            </div>

            <div class="input-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" placeholder="0" required>
            </div>

            <button type="submit" class="btn-salvar">Salvar Produto</button>

            <div class="footer-link">
                <a href="main.html">Voltar ao inicio</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("produto-form").addEventListener('submit', async (event) => {
            event.preventDefault();

            const token = sessionStorage.getItem('token');

            const produtoDados = {
                nome: document.getElementById("nome").value,
                descricao: document.getElementById("descricao").value,
                preco: document.getElementById("preco").value,
                quantidade: document.getElementById("quantidade").value
            };

            try{
                const response = await fetch('http://localhost:8081/produtos', {
                    method:'POST',
                    headers:{
                        'Content-Type':'application/json',
                        'Authorization':`Bearer ${token}`
                    },
                    body: JSON.stringify(produtoDados)
                });

                if(response.ok){
                    alert("Produto cadastrado com sucesso!");
                    document.getElementById("produto-form").reset();
                }else{
                    const message = await response.text();
                    alert("Erro ao cadastrar:" + message);
                }
            }catch(error){
                console.log("Erro na conexão", error);
                alert("Erro ao conectar com o servidor");
            }
        })
    </script>
</body>
</html>
