<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Store Main - Dashboard</title>

    <script>
        document.addEventListener("DOMContentLoaded", () =>{
            const token = sessionStorage.getItem('token');
            const nome = sessionStorage.getItem('nomeUsuario');

            if(!token){
                alert("Acesso negado! faça o login primeiro");
                window.location.href = "loginPage.html";
                return;
            }

            const elementoNome = document.getElementById("nome-operador");
            if(elementoNome) elementoNome.innerText = nome || 'Usuario';
        });

        function acessarCliente(){
            window.location.href = 'clientes.html';
        }

        function acessarPDV(){
            window.location.href = 'PDV.html';
        }

        function acessarProdutos(){
            window.location.href = 'produtos.html';
        }

        function acessarConfiguracoes(){
            window.location.href = 'configuracoes.html';
        }
        
    </script>
</head>
<body>
    <nav class="navbar">
        <h1>Inicio</h1>
        <div class="user-info">Operador: <strong id="nome-operador">Carregando...</strong></div>
    </nav>

    <main class="container">
        <div class="grid-menu">
            <div class="card" id="btn-cliente" onclick="acessarCliente();">
                <div class="icon">👥</div>
                <span>Clientes</span>
            </div>

            <div class="card destaque" id="btn-pvd" onclick="acessarPDV();">
                <div class="icon">💰</div>
                <span>PDV (vendas)</span>
            </div>

            <div class="card" id="btn-produtos" onclick="acessarProdutos();">
                <div class="icon">📦</div>
                <span>Produtos</span>
            </div>

            <div class="card" id="btn-backup" onclick="acessarConfiguracoes();">
                <div class="icon">⚙️</div>
                <span>Back-up</span>
            </div>

        </div>
    </main>
</body>
</html>
