<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginStyle.css">
    <title>Store - Login</title>
</head>
<body>
    
    <div class="container">
        <h2>Acesse sua Conta</h2>
        <p>gerencie sua loja</p>
        
        <form class="form-login" id="form-login">

            <div class="input-group">
                <label for="login">E-mail ou Usuário</label>
                <input type="text" id="login" placeholder="Ex: maria@loja.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>

            <div class="footer-link">
                <span>Não tem conta?</span>
                <a href="cadastroPage.html">Cadastre-se aqui</a>
            </div>
        </form>
    </div>

    <script lang="javascript">
        document.getElementById("form-login").addEventListener('submit', async (event) => {
            event.preventDefault();

            const dados = {
                login: document.getElementById("login").value,
                senha: document.getElementById("senha").value
            };

            try{
                const response = await fetch('http://localhost:8081/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });

                if(response.ok){
                    const data = await response.json();
                    
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('nomeUsuario', document.getElementById("login").value);

                    alert("Login realizado com sucesso!");
                    window.location.href = "main.html";
                }else{
                    const erroText = await response.text();
                    console.log("Status de erro:", response.status);
                    console.log("Detalhes do erro:", erroText);
                    alert("Erro:" + response.status + "-" + erroText);
                }
            }catch(error){
                console.log("Erro ao conectar", error);
            }
        })
    </script>
</body>
</html>
