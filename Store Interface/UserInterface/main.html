<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Store Main - Dashboard</title>
</head>
<body>
    <nav class="navbar">
        <h1>Balcão Digital</h1>
        <div class="user-info">Operador: <strong>Admin</strong></div>
    </nav>

    <main class="container">
        <div class="grid-menu">
            <div class="card" id="btn-cliente">
                <div class="fas-fa-person-icon"></div>
                <span>Clientes</span>
            </div>

            <div class="card destaque" id="btn-pvd">
                <div class="fas-fa-money"></div>
                <span>PVD (vendas)</span>
            </div>

            <div class="card" id="btn-produtos">
                <div class="fas-fa-box"></div>
                <span>Produtos</span>
            </div>

            <div class="card" id="btn-relatorios">
                <div class="fas-fa-graphic"></div>
                <span>Relatórios</span>
            </div>

            <div class="card" id="btn-propriedades">
                <div class="fas-fa-engrenagem"></div>
                <span>Configurações</span>
            </div>

            <div class="card" id="btn-backup">
                <div class="fas-fa-cloud"></div>
                <span>Back-up</span>
            </div>

            <div class="card" id="btn-utilitarios">
                <div class="fas-fa-ferraments"></div>
                <span>Utilitarios</span>
            </div>

            <div class="card" id="btn-comunicados">
                <div class="fas-fa-beels"></div>
                <span>Comunicados</span>
            </div>
        </div>
    </main>

    <section id="tela-dashboard">
        <div class="grid-menu">
            <div class="card" id="btn-produtos">
                <div class="fas-fa-box"></div>
                <span>Produtos</span>
            </div>
        </div>
    </section>

</body>
</html>
