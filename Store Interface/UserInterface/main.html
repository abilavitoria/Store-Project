<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Store Main - Dashboard</title>
</head>
<body>
    <nav class="navbar">
        <h1>Inicio</h1>
        <div class="user-info">Operador: <strong id="nome-operador">Carregando...</strong></div>
    </nav>

    <main class="container">
        <div class="grid-menu">
            <div class="card" id="btn-cliente" onclick="acessarCliente();">
                <div class="icon">👥</div>
                <span>Clientes</span>
            </div>

            <div class="card destaque" id="btn-pvd" onclick="acessarPVD();">
                <div class="icon">💰</div>
                <span>PVD (vendas)</span>
            </div>

            <div class="card" id="btn-produtos" onclick="acessarProdutos();">
                <div class="icon">📦</div>
                <span>Produtos</span>
            </div>

            <div class="card" id="btn-relatorios" onclick="acessarRelatorios();">
                <div class="icon">📊</div>
                <span>Relatórios</span>
            </div>

            <div class="card" id="btn-propriedades" onclick="acessarConfiguracoes();">
                <div class="icon">⚙️</div>
                <span>Configurações</span>
            </div>

            <div class="card" id="btn-backup" onclick="acessarBackup();">
                <div class="icon">☁️</div>
                <span>Back-up</span>
            </div>

            <div class="card" id="btn-utilitarios" onclick="acessarUtilitarios();">
                <div class="icon">🛠️</div>
                <span>Utilitarios</span>
            </div>

            <div class="card" id="btn-comunicados" onclick="acessarComunicados();">
                <div class="icon">🔔</div>
                <span>Comunicados</span>
            </div>
        </div>
    </main>

    <script lang="javascript">
        function acessarCliente(){
            window.location.href = 'clientes.html';
        }

        function acessarUtilitarios(){
            window.location.href = 'utilitarios.html';
        }

        function acessarConfiguracoes(){
            window.location.href = 'configuracoes.html';
        }

        function acessarComunicados(){
            window.location.href = 'comunicados.html';
        }

        function acessarBackup(){
            window.location.href = 'backup.html';
        }

        window.onload = function(){
            operadorSessao = localStorage.getItem("usuarioLogado");
            nomeOperador = localStorage.getItem("nomeUsuario");

            if(operadorSessao){
                elementoOperador.innerText = operadorSessao;
                nomeOperador.innerText = nomeOperador;
            }
            else{
                elementoOperador.innerText = "Visitante";
                nomeOperador.innerText = nomeOperador;
            }
        }
    </script>
</body>
</html>
