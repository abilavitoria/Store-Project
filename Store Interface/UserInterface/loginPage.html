<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginStyle.css">
    <title>Store login</title>
</head>
<body>
    
    <div class="container">
        <h2>Acesse sua Conta</h2>
        <p>gerencie sua loja</p>
        
        <form class="form-login">

            <div class="input-group">
                <label for="login">E-mail ou Usuário</label>
                <input type="text" id="login" placeholder="Ex: maria@loja.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-entrar" onclick="login();">Entrar</button>

            <div class="footer-link">
                <span>Não tem conta?</span>
                <a href="cadastroPage.html">Cadastre-se aqui</a>
            </div>
        </form>
    </div>

    <script lang="javascript">
        async function login(){
            const login = document.getElementById('login').value;
            const senha = document.getElementById('senha').value;

            if(!login || !senha) alert("Informe seu email e senha!"); return;

            try{
                const response = await fetch('http://localhost:8081/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({login, senha})
                });

                if(response.ok){
                    const data = await response.json();

                    localStorage.setItem("token", data.token);
                    localStorage.setItem("nomeUsuario", data.nome);
                    localStorage.setItem("usuarioLogado", data.role);

                    window.location.href = "main.html";
                }else{
                    alert("Login ou senha inválidos");
                }
            }catch(error){
                alert("Erro ao authenticar");
            }
        
        }
    </script>
</body>
</html>
