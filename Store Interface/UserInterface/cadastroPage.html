<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store cadastro</title>
</head>
<body>
    <div class="container">
        <h2>Crie seu cadastro</h2>
        <p>gerencie sua loja</p>
        <br>
        <form class="form-cadastro">

            <div class="input-group">
                <label for="cadastro">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>

            <div class="input-group">
                <label for="cadastro">E-mail</label>
                <input type="email" id="email" placeholder="Seu e-mail" required>
            </div>

            <div class="input-group">
                <label for="cadastro">Telefone</label>
                <input type="tel" id="telefone" placeholder="Seu telefone" required>
            </div>

            <div class="input-group">
                <label for="cadastro">CPF</label>
                <input type="text" id="cpf" placeholder="Seu cpf" required>
            </div>

            <div class="input-group">
                <label for="cadastro">CNPJ</label>
                <input type="text" id="cnpj" placeholder="Seu cnpj" required>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>

            <div class="footer-link">
                <span>Já tem uma conta?</span>
                <a href="loginPage.html">Login</a>
            </div>
        </form>
    </div>
</body>
</html>
