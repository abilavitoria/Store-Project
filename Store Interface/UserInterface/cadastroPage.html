<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastroStyle.css">
    <title>Store cadastro</title>
</head>
<body>
    <div class="container">
        <h2>Crie seu cadastro</h2>
        <p>gerencie sua loja</p>
        <br>
        <form class="form-cadastro">

            <div class="input-group">
                <label for="cadastro">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>

            <div class="input-group">
                <label for="cadastro">E-mail</label>
                <input type="email" id="email" placeholder="email@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="cadastro">Telefone</label>
                <input type="tel" id="telefone" placeholder="(00)00000-0000" required>
            </div>

            <div class="toogle-container">
                <input type="radio" name="tipo" id="pessoaFisica" checked onclick="alternarCampos()">
                <label for="pessoaFisica" class="toogle-label">(Cliente/Vendedor)</label>

                <input type="radio" name="tipo" id="pessoaJuridica" onclick="alternarCampos()">
                <label for="pessoaJuridica" class="toogle-label">(Administrador)</label>
            </div>  

            <div class="input-group" id="group-cpf">
                <label for="cadastro">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="input-group" id="group-cnpj" style="display: none;">
                <label for="cadastro">CNPJ</label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" required>
            </div>

            <button type="button" class="btn-entrar" onclick="entrar();">Entrar</button>

            <div class="footer-link">
                <span>Já tem uma conta?</span>
                <a href="loginPage.html">Login</a>
            </div>
        </form>
    </div>

    <script lang="javascript">
        function alternarCampos(){
            const isPF = document.getElementById('pessoaFisica').checked;
            const groupCpf = document.getElementById('group-cpf');
            const groupCnpj = document.getElementById('group-cnpj');

            if(isPF){
                groupCpf.style.display = "block";
                groupCnpj.style.display = "none";
                document.getElementById('cnpj').value = "";
            }
            else{
                groupCnpj.style.display = "block";
                groupCpf.style.display = "none";
                document.getElementById('cpf').value = "";
            }
        }

        function entrar(){
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const cpf = document.getElementById('cpf').value;
            const cnpj = document.getElementById('cnpj').value;

            if(nome && email && telefone && cpf || cnpj){
                window.location.href = "main.html";
            }
            else{
                alert("Preencha os campos corretamente!");
            }
        }
    </script>
</body>
</html>
